# Default build — used when VITE_APP_MODE is set via Netlify dashboard env vars.
# Set VITE_API_BASE_URL and optionally VITE_APP_MODE in each site's dashboard.
#
# For two separate Netlify sites from this same repo:
#   Admin site  → env: VITE_APP_MODE=admin,   VITE_API_BASE_URL=https://your-api.onrender.com
#   Patient site → env: VITE_APP_MODE=patient, VITE_API_BASE_URL=https://your-api.onrender.com

[build]
  base    = "apps/web"
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
