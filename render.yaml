services:
  - type: web
    name: pediform-api
    runtime: node
    buildCommand: cd apps/api && npm install && npm run build
    startCommand: node apps/api/dist/index.js
    disk:
      name: pediform-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/pediform.db
      - key: DATA_PATH
        value: /var/data
