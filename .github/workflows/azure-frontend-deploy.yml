name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/azure-frontend-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build patient site
        working-directory: apps/web
        env:
          VITE_APP_MODE: patient
          VITE_API_BASE_URL: ${{ vars.AZURE_API_URL }}
        run: |
          npm install
          npm run build

      - name: Deploy patient site
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_PATIENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/web
          output_location: dist
          skip_app_build: true
